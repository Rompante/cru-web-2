<html>
<head>
    <meta charset="UTF-8">
</head>
<body>

<h1>Editar Cliente</h1>

<form method="POST" action="/atualizar">

    <input type="hidden" name="id" value="{{id}}" >
    Nome:

    <input name="nome" value="{{nome}}" >
    <br><br>

    Email:
    <input name="email" value="{{email}}"  >
    <br><br>

    Telefone:

    <input name="telefone"  value="{{telefone}}" >
    <br><br>
    <button type="submit">
        Atualizar
    </button>

</form>

</body>
</html>
